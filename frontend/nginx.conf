server {
    listen 80;
    server_name _;

    # Racine pour les fichiers statiques
    root /usr/share/nginx/html;
    index index.html;

    # Servir les fichiers statiques
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy vers l'API (modifié pour utiliser le nom "api")
    #
    # NB: when proxy_pass uses a variable (here $upstream), nginx ignores
    # the path/URI part of proxy_pass entirely — the trailing "/" that would
    # normally strip the "/api/" prefix is NOT applied. We have to rewrite
    # the URI ourselves before the proxy_pass directive.
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $upstream api;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://$upstream:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}