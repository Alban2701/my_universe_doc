  services:
    server:
      build:
        context: .
      ports:
        - "8000:8000"
      environment:
        POSTGRES_HOST: db
        POSTGRES_PORT: 5432
        DATABASE_NAME: my_universe_doc_db
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: myuniversedocpwdb
        SERVER_PORT: 8000
      depends_on:
        db:
          condition: service_healthy
      volumes:
        - .:/app # Monte le code local dans le conteneur
      command: python3 start_uvicorn.py

    db:
      image: postgres:18
      restart: always
      environment:
        POSTGRES_DB: my_universe_doc_db
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      volumes:
        - db-data:/var/lib/postgresql
        - ./src/seed:/docker-entrypoint-initdb.d
      ports:
        - "5432:5432"
      healthcheck:
        test: [ "CMD", "pg_isready", "-U", "postgres" ]
        interval: 10s
        timeout: 5s
        retries: 5

  volumes:
    db-data:
