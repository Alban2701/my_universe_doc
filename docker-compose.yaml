networks:
  db-network:
  frontend-network:

services:
  api:
    container_name: myd_api
    build:
      context: ./backend
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DATABASE_NAME: my_universe_doc_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: myuniversedocpwdb
      SERVER_PORT: 8000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: python3 backend/start_uvicorn.py
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request, sys; sys.exit(0) if urllib.request.urlopen(\"http://localhost:8000/\").status == 200 else sys.exit(1)'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - db-network
      - frontend-network

  frontend:
    container_name: myd_front
    build:
      context: ./frontend
    ports:
      - 80:80
    volumes:
      - .:/app
    depends_on:
      api:
        condition: service_healthy
    networks:
      - frontend-network

  db:
    image: postgres:18
    restart: always
    container_name: myd_db
    environment:
      POSTGRES_DB: my_universe_doc_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: myuniversedocpwdb
    volumes:
      - db-data:/var/lib/postgresql
      - ./backend/src/data:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - db-network

volumes:
  db-data:

