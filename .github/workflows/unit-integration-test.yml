name: Units and Integration Tests

on:
  push:
    branches: [main, dev]
    paths:
        - "backend/**"
        - ".github/workflows/unit-integration-test.yml"
  pull_request:
    branches: [main, dev]
    paths:
        - "backend/**"
        - ".github/workflows/unit-integration-test.yml"

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.10"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run unit tests
        # tests/units/ may legitimately be empty for now — treat pytest's
        # "no tests collected" (exit 5) as success.
        run: |
          set +e
          pytest tests/units/ -v
          code=$?
          set -e
          if [ "$code" -eq 5 ]; then
            echo "No unit tests collected — skipping."
            exit 0
          fi
          exit "$code"

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12.10"
      - run: pip install -r requirements-dev.txt
      - name: Ruff (static analysis)
        run: ruff check .

  integration-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.10"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Start test DB
        run: docker compose -f docker-compose.test.yaml up -d

      - name: Wait for DB
        run: |
          for i in $(seq 1 15); do
            docker exec myd_db_test pg_isready -U postgres && break
            echo "Waiting... ($i)"
            sleep 2
          done

      - name: Run integration tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5434
          DATABASE_NAME: my_universe_doc_db_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: myuniversedocpwdb
        run: pytest tests/integration/ -v

      - name: Stop test DB
        if: always()
        run: docker compose -f docker-compose.test.yaml down -v
